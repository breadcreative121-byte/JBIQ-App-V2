      const headerInner = el('div', {}, [
        el('h1', { class: 'page__title', text: 'JBIQ Conversation Playground' }),
        el('p', {
          class: 'page__subtitle',
          text: 'Pick a dataset to drive the real chat surface',
        }),
      ]);

      const homeStateSelect = el('select', { class: 'dataset-select__control' });
      for (const opt of [
        { value: 'new-user',    label: 'New user' },
        { value: 'return-user', label: 'Return user' },
      ]) {
        const o = el('option', { value: opt.value, text: opt.label });
        if (opt.value === activeHomeState) o.setAttribute('selected', 'selected');
        homeStateSelect.appendChild(o);
      }
      const homeStateSelector = el('div', { class: 'dataset-select' }, [
        el('label', { class: 'dataset-select__label', text: 'Home page state:' }),
        homeStateSelect,
      ]);

      // States — frozen previews of each conversation state, grouped into
      // semantic clusters so the shape of the conversation (connection →
      // active voice → processing → results / transactional) is legible
      // from the dropdown. Voice gets all six clusters; chat hides the
      // Active voice and Muted clusters (no audio mode). Each entry carries
      // `when` / `inspect` copy that drives the caption panel beside the
      // iframe. Keys are prefixed `state:` so the dispatcher can route.
      const STATE_CLUSTERS_VOICE = [
        {
          group: 'Connection',
          items: [
            { key: 'state:connecting', label: 'Connecting',
              when: 'Fresh open, before the mic handshake completes.',
              inspect: 'Centered avatar position, "Connecting…" copy, that the screen doesn\'t feel dead while waiting.' },
            { key: 'state:connected', label: 'Connected',
              when: 'Mic permission granted, before the user has said anything.',
              inspect: '"Say something…" prompt, avatar idle motion, the invitation to speak.' },
          ],
        },
        {
          group: 'Active voice',
          items: [
            { key: 'state:listening', label: 'Listening',
              when: 'Mid-conversation, between turns. Mic is hot.',
              inspect: 'Active mic affordance, status pill copy, motion of the avatar while waiting.' },
            { key: 'state:speaking-user', label: 'Speaking — user',
              when: 'User is mid-utterance. Interim transcript pins to the top.',
              inspect: 'Transcript opacity (0.6), pin position, "Listening…" status pill.' },
            { key: 'state:speaking', label: 'Speaking — agent',
              when: 'Agent is replying out loud.',
              inspect: 'Avatar speaking motion, whether on-screen text tracks what\'s being spoken.' },
            { key: 'state:idle', label: 'Idle',
              when: 'Mid-conv, neither side is speaking — the gap between agent finishing and user picking up.',
              inspect: 'Whether the surface still feels alive vs. abandoned, ambient motion.' },
          ],
        },
        {
          group: 'Muted',
          items: [
            { key: 'state:muted-welcome', label: 'Muted — welcome',
              when: 'Fresh open with mic muted. Cold-start path for users who deny / disable mic.',
              inspect: '"Unmute to speak" CTA, muted icon variant, recovery affordance.' },
            { key: 'state:muted-midconv', label: 'Muted — mid-conv',
              when: 'User muted themselves partway through a thread.',
              inspect: 'Muted pill placement, mic icon flip, that prior conversation context is preserved.' },
          ],
        },
        {
          group: 'Processing',
          items: [
            { key: 'state:thinking', label: 'Thinking',
              when: 'User has just spoken; agent is composing.',
              inspect: 'Thinking-row loader, dwell time before content lands.' },
            { key: 'state:fetching-jiomart', label: 'Fetching — JioMart',
              when: 'Same beat as Thinking, but a partner call is in flight.',
              inspect: '"Searching JioMart" copy, branded fetch animation, how it diverges from generic Thinking.' },
          ],
        },
        {
          group: 'Transactional',
          items: [
            { key: 'state:confirm', label: 'Confirm',
              when: 'Transactional flow — agent has surfaced a card the user must approve before payment.',
              inspect: 'Card layout, price clarity, "Confirm & Pay" hierarchy.' },
            { key: 'state:confirmation', label: 'Confirmation',
              when: 'Order placed — receipt + delivery progress.',
              inspect: 'Paid-status treatment, progress stages, dwell behaviour after the action.' },
          ],
        },
        {
          group: 'Results',
          items: [
            { key: 'state:results-text', label: 'Results — text',
              when: 'Informational answer in prose (factual / explanatory queries).',
              inspect: 'Prose typography, feedback icon placement and contrast.' },
            { key: 'state:results-cards', label: 'Results — cards',
              when: 'Discovery answer with multiple cards (places, products).',
              inspect: 'Card grid, scroll behaviour, edge affordance at the right margin.' },
          ],
        },
      ];
      const CHAT_HIDDEN_CLUSTERS = new Set(['Active voice', 'Muted']);
      const STATE_CLUSTERS_CHAT = STATE_CLUSTERS_VOICE.filter(c => !CHAT_HIDDEN_CLUSTERS.has(c.group));

      const STATE_DESCRIPTIONS = {};
      for (const cluster of STATE_CLUSTERS_VOICE) {
        for (const item of cluster.items) {
          STATE_DESCRIPTIONS[item.key] = { label: item.label, when: item.when, inspect: item.inspect };
        }
      }

      const appendStatesOptgroup = (selectEl, clusters) => {
        for (const cluster of clusters) {
          const group = el('optgroup', { label: 'States — ' + cluster.group });
          for (const o of cluster.items) {
            group.appendChild(el('option', { value: o.key, text: o.label }));
          }
          selectEl.appendChild(group);
        }
      };

      const select = el('select', { class: 'dataset-select__control' });
      const chatPlaceholder = el('option', { value: '', text: 'Select experience' });
      chatPlaceholder.setAttribute('disabled', 'disabled');
      chatPlaceholder.setAttribute('selected', 'selected');
      chatPlaceholder.setAttribute('hidden', 'hidden');
      select.appendChild(chatPlaceholder);
      appendStatesOptgroup(select, STATE_CLUSTERS_CHAT);
      for (const g of DATASET_GROUPS) {
        const group = el('optgroup', { label: g.group });
        for (const it of g.items) {
          const o = el('option', { value: it.key, text: it.label });
          group.appendChild(o);
        }
        select.appendChild(group);
      }
      const selector = el('div', { class: 'dataset-select' }, [
        el('label', { class: 'dataset-select__label', text: 'Chat experience:' }),
        select,
      ]);

      const voiceSelect = el('select', { class: 'dataset-select__control' });
      const voicePlaceholder = el('option', { value: '', text: 'Select experience' });
      voicePlaceholder.setAttribute('disabled', 'disabled');
      voicePlaceholder.setAttribute('selected', 'selected');
      voicePlaceholder.setAttribute('hidden', 'hidden');
      voiceSelect.appendChild(voicePlaceholder);
      appendStatesOptgroup(voiceSelect, STATE_CLUSTERS_VOICE);
      for (const g of DATASET_GROUPS) {
        const group = el('optgroup', { label: g.group });
        for (const it of g.items) {
          const o = el('option', { value: it.key, text: it.label });
          group.appendChild(o);
        }
        voiceSelect.appendChild(group);
      }
      const voiceSelector = el('div', { class: 'dataset-select' }, [
        el('label', { class: 'dataset-select__label', text: 'Voice experience:' }),
        voiceSelect,
      ]);

      // Error scenarios dropdown — drives runPrototypeErrorScenario(id, lang)
      // in the iframe to render the framework's §6 worked examples.
      const errorSelect = el('select', { class: 'dataset-select__control' });
      const errorPlaceholder = el('option', { value: '', text: 'Select error scenario' });
      errorPlaceholder.setAttribute('disabled', 'disabled');
      errorPlaceholder.setAttribute('selected', 'selected');
      errorPlaceholder.setAttribute('hidden', 'hidden');
      errorSelect.appendChild(errorPlaceholder);
      const errorGroups = window.ERROR_SCENARIO_GROUPS || [];
      const errorScenarios = window.ERROR_SCENARIOS || {};
      for (const g of errorGroups) {
        const group = el('optgroup', { label: g.group });
        for (const key of g.items) {
          const sc = errorScenarios[key];
          if (!sc) continue;
          const o = el('option', { value: key, text: `${sc.ref}  ${sc.label}` });
          group.appendChild(o);
        }
        errorSelect.appendChild(group);
      }

      // EN / Hinglish toggle — flips active language; re-dispatches if a
      // scenario is already on screen so reviewers can compare live.
      const langEnBtn = el('button', {
        type: 'button',
        class: 'lang-toggle__btn',
        text: 'EN',
        'aria-pressed': 'true',
      });
      const langHiBtn = el('button', {
        type: 'button',
        class: 'lang-toggle__btn',
        text: 'Hinglish',
        'aria-pressed': 'false',
      });
      const langToggle = el('div', { class: 'lang-toggle', role: 'group', 'aria-label': 'Language' }, [
        langEnBtn, langHiBtn,
      ]);

      const errorSelector = el('div', { class: 'dataset-select' }, [
        el('label', { class: 'dataset-select__label', text: 'Error scenario:' }),
        errorSelect,
        langToggle,
      ]);

      // Live experience iframe — embeds /index.html so the playground renders
      // the real chat surface (user bubble, prose, DiscoveryView card, edge
      // pill, transactional Confirm & Pay). Dropdown drives the iframe via
      // its window.runPrototypeQuery hook — same path the burger Prototypes
      // panel uses inside the host app.
      const liveFrame = el('iframe', {
        class: 'live-frame',
        src: 'index.html?home=' + activeHomeState,
        style: {
          width: '380px',
          height: '780px',
          border: '1px solid rgba(12,13,16,0.12)',
          borderRadius: '32px',
          display: 'block',
          margin: '16px 0',
          background: '#fff',
          boxShadow: '0 8px 28px rgba(12,13,16,0.08)',
        },
      });

      // Caption panel — sits beside the iframe, populated for both `state:*`
      // picks (When / Inspect for a frozen conversation state) and dataset
      // picks (Pattern / Demonstrates for a sample query). Hidden when the
      // selection has no description (placeholder, error scenarios).
      const captionTitle = el('h3', { class: 'state-caption__title' });
      const captionGroup = el('p', { class: 'state-caption__group' });
      const captionDl = el('dl', { class: 'state-caption__dl' });
      const captionPanel = el('aside', { class: 'state-caption' }, [
        captionTitle,
        captionGroup,
        captionDl,
      ]);
      captionPanel.setAttribute('hidden', 'hidden');
      captionGroup.setAttribute('hidden', 'hidden');

      const setCaption = (title, subtitle, sections) => {
        if (!title || !sections || !sections.length) {
          captionPanel.setAttribute('hidden', 'hidden');
          return;
        }
        captionTitle.textContent = title;
        if (subtitle) {
          captionGroup.textContent = subtitle;
          captionGroup.removeAttribute('hidden');
        } else {
          captionGroup.removeAttribute('hidden');
          captionGroup.setAttribute('hidden', 'hidden');
        }
        captionDl.replaceChildren();
        for (const s of sections) {
          captionDl.appendChild(el('dt', { class: 'state-caption__dt', text: s.label }));
          captionDl.appendChild(el('dd', { class: 'state-caption__dd', text: s.body }));
        }
        captionPanel.removeAttribute('hidden');
      };

      const updateCaption = (key) => {
        const stateDesc = STATE_DESCRIPTIONS[key];
        if (stateDesc) {
          setCaption(stateDesc.label, null, [
            { label: 'When', body: stateDesc.when },
            { label: 'Inspect', body: stateDesc.inspect },
          ]);
          return;
        }
        const datasetDesc = DATASET_INFO[key];
        if (datasetDesc) {
          setCaption(datasetDesc.label, datasetDesc.groupName, [
            { label: 'Pattern', body: datasetDesc.groupDescription },
            { label: 'Demonstrates', body: datasetDesc.demonstrates },
          ]);
          return;
        }
        setCaption(null, null, null);
      };

      const homeStateSrc = () => 'index.html?home=' + activeHomeState;

      // Dispatch the active dataset's sample utterance into the iframe. Reload
      // the iframe each time so the chat surface starts fresh (no accumulated
      // history from previous picks). Wait for load before calling the host's
      // runPrototypeQuery / runPrototypeVoiceQuery hook depending on which
      // dropdown most recently fired.
      const dispatchActive = () => {
        const surface = lastSurface;
        const onLoad = () => {
          liveFrame.removeEventListener('load', onLoad);
          try {
            const w = liveFrame.contentWindow;
            if (surface === 'error') {
              if (typeof w.runPrototypeErrorScenario === 'function') {
                w.runPrototypeErrorScenario(activeErrorKey, activeLang);
              }
              return;
            }
            const key = surface === 'voice' ? activeVoiceKey : activeKey;
            if (typeof key === 'string' && key.startsWith('state:')) {
              const stateId = key.slice('state:'.length);
              if (typeof w.runPrototypeState === 'function') {
                w.runPrototypeState(stateId, surface);
              }
              return;
            }
            const item = DATASETS[key];
            const shape = itemShape(item);
            if (surface === 'voice' && typeof w.runPrototypeVoiceQuery === 'function') {
              w.runPrototypeVoiceQuery(shape.query);
            } else if (typeof w.runPrototypeQuery === 'function') {
              w.runPrototypeQuery(shape.query);
            }
          } catch (e) {
            console.warn('Live frame dispatch failed:', e);
          }
        };
        liveFrame.addEventListener('load', onLoad);
        liveFrame.src = homeStateSrc();
      };

      // Re-dispatch the *current* error scenario in-place (no iframe reload)
      // so the language toggle flips copy live without losing visual state.
      const redispatchErrorInPlace = () => {
        if (lastSurface !== 'error' || !activeErrorKey) return;
        try {
          const w = liveFrame.contentWindow;
          if (typeof w.runPrototypeErrorScenario === 'function') {
            w.runPrototypeErrorScenario(activeErrorKey, activeLang);
          }
        } catch (e) {
          console.warn('Live frame re-dispatch (lang) failed:', e);
        }
      };

      homeStateSelect.addEventListener('change', (e) => {
        activeHomeState = e.target.value;
        liveFrame.src = homeStateSrc();
        console.log('home-state.change.' + activeHomeState);
      });

      select.addEventListener('change', (e) => {
        activeKey = e.target.value;
        lastSurface = 'chat';
        updateCaption(activeKey);
        dispatchActive();
        console.log(`dataset.change.${activeKey}`);
      });

      voiceSelect.addEventListener('change', (e) => {
        activeVoiceKey = e.target.value;
        lastSurface = 'voice';
        updateCaption(activeVoiceKey);
        dispatchActive();
        console.log(`voice-experience.change.${activeVoiceKey}`);
      });

      errorSelect.addEventListener('change', (e) => {
        activeErrorKey = e.target.value;
        lastSurface = 'error';
        updateCaption(null);
        dispatchActive();
        console.log(`error-scenario.change.${activeErrorKey}.${activeLang}`);
      });

      const setLang = (next) => {
        if (next === activeLang) return;
        activeLang = next;
        langEnBtn.setAttribute('aria-pressed', String(next === 'en'));
        langHiBtn.setAttribute('aria-pressed', String(next === 'hi'));
        redispatchErrorInPlace();
        console.log(`error-scenario.lang.${activeLang}`);
      };
      langEnBtn.addEventListener('click', () => setLang('en'));
      langHiBtn.addEventListener('click', () => setLang('hi'));

      const controls = el('div', { class: 'page__controls' }, [homeStateSelector, voiceSelector, selector, errorSelector]);
      const scopeNote = el('p', {
        class: 'page__scope-note',
        text: 'Out of scope: Homepage, Tools, Assistants and onboarding ',
      });
      const wipNote = el('p', {
        class: 'page__scope-note',
        text: 'Please note: This is a work in progress and for demo purposes',
      });
      const header = el('div', { class: 'page__title-block' }, [headerInner, controls, scopeNote, wipNote]);
      const stage = el('div', { class: 'stage' }, [liveFrame, captionPanel]);
      const page = el('div', { class: 'page' }, [header, stage]);
      rootEl.appendChild(page);
    }

    mountPlayground(document.getElementById('root'));
  </script>
</body>
</html>
